name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Review with Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import os

          with open("pr_diff.txt", "r", encoding="utf-8", errors="ignore") as f:
              diff = f.read()

          diff = diff[:12000]

          prompt = f"""당신은 Unreal Engine 5 C++ 전문 코드 리뷰어입니다.
          아래 PR diff를 분석하고 한국어로 리뷰해주세요.

          리뷰 항목:
          - 버그 또는 런타임 오류 가능성
          - 설계 구조 및 SRP 위반 여부
          - 메모리 안전성 (TWeakObjectPtr, null 체크 등)
          - GAS (Gameplay Ability System) 패턴 준수 여부
          - 개선 제안

          diff:
          {diff}
          """

          payload = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"maxOutputTokens": 1500}
          }

          api_key = os.environ["GEMINI_API_KEY"]
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req) as res:
              result = json.loads(res.read())

          review = result["candidates"][0]["content"]["parts"][0]["text"]

          with open("review_output.txt", "w", encoding="utf-8") as f:
              f.write(review)

          EOF

      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review_output.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Gemini Code Review\n\n${review}`
            });
